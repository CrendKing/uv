name: Sync with upstream

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 2

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull upstream
        run: |
          git remote add upstream https://github.com/astral-sh/uv
          git fetch upstream main --depth 1
          git rebase --onto upstream/main HEAD~1

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --features=performance,windows-gui-bin --no-default-features

      - name: Archive build artifacts
        uses: actions/upload-artifact@v6
        with:
          path: |
            target/release/uv.exe
            target/release/uvx.exe
            target/release/uvw.exe
          if-no-files-found: error
